<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Management Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center mb-4">Guest Registration</h2>

  <form id="customerForm" class="row g-3">

    <div class="col-md-6">
      <input type="text" class="form-control" id="name" placeholder="Full Name">
    </div>

    <div class="col-md-6">
      <input type="text" class="form-control" id="phone" placeholder="Phone Number">
    </div>

    <div class="col-md-6">
      <input type="email" class="form-control" id="email" placeholder="Email">
    </div>

    <div class="col-md-6">
      <input type="text" class="form-control" id="aadhar" placeholder="Aadhar Number">
    </div>

    <div class="col-md-6">
      <input type="date" class="form-control" id="checkin">
    </div>

    <div class="col-md-6">
      <input type="date" class="form-control" id="checkout">
    </div>

    <div class="col-md-6">
      <input type="number" class="form-control" id="adults" placeholder="No of Adults">
    </div>

    <div class="col-md-12">
      <textarea class="form-control" id="address" placeholder="Address"></textarea>
    </div>

    <div class="col-md-12">
      <textarea class="form-control" id="purpose" placeholder="Purpose of Visit"></textarea>
    </div>

    <div class="col-12 text-center">
      <button type="submit" class="btn btn-primary">Submit</button>
      <a href="view.html" class="btn btn-success">View Data</a>
    </div>

  </form>

  <div id="messageBox" class="mt-3"></div>
</div>

<script src="app.js"></script>
</body>
</html>
